name: C/C++ CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Cache apt packages
      uses: actions/cache@v4
      with:
        path: /var/cache/apt/archives
        key: apt-${{ runner.os }}-flex-bison-boost

    - name: Install dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends \
          flex bison libfl-dev \
          libboost-filesystem-dev \
          libboost-program-options-dev \
          libboost-system-dev

    - name: Configure
      run: ./configure

    - name: Build core (plingua compiler + psim simulator)
      run: make grammar compiler simulator

    - name: Build extensions (RR demos, example programs, tests)
      run: make extensions

    - name: Install plingua (required for reading_example)
      run: sudo make install

    - name: Build reading example
      run: make reading_example

    - name: Check (run P-Lingua compiler on example programs)
      run: make check

    - name: Test (e2e unit tests)
      run: make test

    - name: Test extensions (RR enhanced + next-directions tests)
      run: make test_extensions
